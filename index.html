<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITM Gwalior – Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1F3A;
    --navy-mid: #122849;
    --gold: #D4A843;
    --gold-light: #F0C96A;
    --white: #FFFFFF;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(212,168,67,0.08);
    animation: expand 4s ease-out infinite;
  }
  .ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
  .ring:nth-child(2) { width: 360px; height: 360px; animation-delay: 0.6s; }
  .ring:nth-child(3) { width: 520px; height: 520px; animation-delay: 1.2s; }
  .ring:nth-child(4) { width: 700px; height: 700px; animation-delay: 1.8s; }
  @keyframes expand {
    0% { opacity: 0.6; transform: scale(0.95); }
    100% { opacity: 0; transform: scale(1.05); }
  }

  /* Particle dots */
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    animation: float-particle linear infinite;
    opacity: 0;
  }
  @keyframes float-particle {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-120px) rotate(360deg); opacity: 0; }
  }

  /* Logo */
  .loader-logo {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .logo-hex {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, #D4A843 0%, #C4922E 100%);
    border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 28px;
    box-shadow: 0 0 60px rgba(212,168,67,0.3), 0 20px 40px rgba(0,0,0,0.3);
    animation: logo-pulse 2s ease-in-out infinite;
  }
  @keyframes logo-pulse {
    0%,100% { box-shadow: 0 0 60px rgba(212,168,67,0.3), 0 20px 40px rgba(0,0,0,0.3); }
    50% { box-shadow: 0 0 90px rgba(212,168,67,0.5), 0 20px 40px rgba(0,0,0,0.3); }
  }

  .loader-title {
    font-family: 'Sora', sans-serif;
    font-size: 30px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    animation: fadeUp 0.8s ease 0.2s both;
  }
  .loader-title span { color: var(--gold); }

  .loader-subtitle {
    font-size: 13px;
    color: rgba(212,168,67,0.7);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  /* Progress bar */
  .progress-wrap {
    width: 220px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
    animation: fadeUp 0.8s ease 0.5s both;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 4px;
    transition: width 0.15s ease;
    box-shadow: 0 0 10px rgba(212,168,67,0.5);
  }

  .loader-status {
    font-size: 12px;
    color: rgba(138,155,189,0.7);
    min-height: 18px;
    animation: fadeUp 0.8s ease 0.6s both;
    letter-spacing: 0.02em;
  }

  .loader-dots {
    display: flex;
    gap: 8px;
    margin-top: 36px;
    animation: fadeUp 0.8s ease 0.7s both;
  }
  .loader-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(212,168,67,0.3);
    animation: dot-bounce 1.4s ease-in-out infinite;
  }
  .loader-dot:nth-child(1) { animation-delay: 0s; }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce {
    0%,80%,100% { transform: translateY(0); background: rgba(212,168,67,0.3); }
    40% { transform: translateY(-8px); background: var(--gold); }
  }

  /* Fade out animation */
  body.fade-out { animation: fadeOut 0.6s ease forwards; }
  @keyframes fadeOut {
    to { opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .version-tag {
    position: absolute;
    bottom: 24px;
    font-size: 11px;
    color: rgba(138,155,189,0.35);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<!-- Rings -->
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>

<!-- Particles (generated by JS) -->

<div class="loader-logo">
  <div class="logo-hex">ITM</div>
  <h1 class="loader-title">ITM <span>Gwalior</span></h1>
  <p class="loader-subtitle">Smart Assistant · AI Powered</p>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <p class="loader-status" id="loader-status">Initializing…</p>

  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>

<p class="version-tag">v1.0.0 · ITM University, Gwalior</p>

<script>
  // Create floating particles
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: ${Math.random() * 30}%;
      width: ${2 + Math.random() * 4}px;
      height: ${2 + Math.random() * 4}px;
      animation-duration: ${3 + Math.random() * 4}s;
      animation-delay: ${Math.random() * 4}s;
      opacity: ${0.3 + Math.random() * 0.5};
    `;
    document.body.appendChild(p);
  }

  const bar = document.getElementById('progress-bar');
  const status = document.getElementById('loader-status');

  const steps = [
    [10, 'Loading college data…'],
    [30, 'Setting up AI engine…'],
    [55, 'Preparing knowledge base…'],
    [75, 'Connecting services…'],
    [90, 'Almost ready…'],
    [100, 'Welcome to ITM Gwalior!']
  ];

  let i = 0;
  function nextStep() {
    if (i >= steps.length) {
      setTimeout(() => {
        document.body.classList.add('fade-out');
        setTimeout(() => window.location.href = 'language.html', 600);
      }, 400);
      return;
    }
    const [pct, msg] = steps[i++];
    bar.style.width = pct + '%';
    status.textContent = msg;
    setTimeout(nextStep, i === steps.length ? 600 : 500 + Math.random() * 300);
  }

  setTimeout(nextStep, 700);
</script>
</body>
</html>
